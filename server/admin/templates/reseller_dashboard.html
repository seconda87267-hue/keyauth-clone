{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block dash_active %}active{% endblock %}
{% block content %}
<h1 style="margin-bottom: 25px;">Reseller Dashboard</h1>

<div class="stats">
    <div class="stat-card">
        <div class="value">{{ total_keys }}</div>
        <div class="label">Keys Generated</div>
    </div>
    <div class="stat-card">
        <div class="value">{{ apps|length }}</div>
        <div class="label">Applications</div>
    </div>
</div>

<div class="card">
    <h3>Generate License Keys</h3>
    <form method="post" action="/admin/generate" class="form-inline">
        <div class="form-group">
            <label>Count</label>
            <input type="number" name="count" value="1" min="1" max="100">
        </div>
        <div class="form-group">
            <label>Expiry (days, 0 = never)</label>
            <input type="number" name="expiry_days" value="30" min="0">
        </div>
        <div class="form-group">
            <label>App</label>
            <select name="app_id">
                <option value="0">None</option>
                {% for a in apps %}
                <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Key Type</label>
            <select name="key_type">
                <option value="regular">Regular</option>
                <option value="vip">VIP</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Generate</button>
    </form>
</div>
{% endblock %}
