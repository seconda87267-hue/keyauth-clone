<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyAuth Admin - {% block title %}Dashboard{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100%; background: #1a1a2e; padding: 20px 0; border-right: 1px solid #2a2a4a; z-index: 10; }
        .sidebar h2 { color: #7c5cfc; padding: 0 20px 20px; border-bottom: 1px solid #2a2a4a; font-size: 18px; }
        .sidebar a { display: block; padding: 12px 20px; color: #a0a0c0; text-decoration: none; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #2a2a4a; color: #fff; border-left: 3px solid #7c5cfc; }
        .main { margin-left: 220px; padding: 30px; }
        .card { background: #1a1a2e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a4a; }
        .card h3 { color: #7c5cfc; margin-bottom: 15px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 20px; text-align: center; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #7c5cfc; }
        .stat-card .label { color: #888; margin-top: 5px; font-size: 13px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #2a2a4a; }
        th { color: #7c5cfc; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        td { color: #c0c0d0; }
        tr:hover { background: #22223a; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #1a3a2a; color: #4cdf8b; }
        .badge-red { background: #3a1a1a; color: #ef6b6b; }
        .badge-yellow { background: #3a3a1a; color: #efc86b; }
        .badge-blue { background: #1a2a3a; color: #6bb5ef; }
        .badge-purple { background: #2a1a3a; color: #c084fc; }
        .btn { display: inline-block; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn-primary { background: #7c5cfc; color: #fff; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-warning { background: #f59e0b; color: #000; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .pagination a { padding: 6px 12px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 4px; color: #a0a0c0; text-decoration: none; }
        .pagination a:hover { background: #2a2a4a; color: #fff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #a0a0c0; margin-bottom: 5px; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #7c5cfc; }
        input[type=number] { width: 80px; }
        .form-inline { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .mono { font-family: 'Courier New', monospace; font-size: 13px; }
        .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
        .logout { margin-top: 30px; padding: 12px 20px; border-top: 1px solid #2a2a4a; }
        .logout a { color: #ef6b6b !important; }
        .flex { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        pre.creds { background: #0f0f1a; padding: 15px; border-radius: 6px; border: 1px solid #2a2a4a; font-size: 13px; overflow-x: auto; }
        .copy-btn { cursor: pointer; margin-left: 8px; padding: 2px 8px; background: #2a2a4a; border: none; border-radius: 3px; color: #a0a0c0; font-size: 11px; }
        .copy-btn:hover { background: #3a3a5a; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>KeyAuth</h2>
        <a href="/admin/dashboard" class="{% block dash_active %}{% endblock %}">Dashboard</a>
        <a href="/admin/applications" class="{% block app_active %}{% endblock %}">Applications</a>
        <a href="/admin/licenses" class="{% block lic_active %}{% endblock %}">Licenses</a>
        <a href="/admin/logs" class="{% block logs_active %}{% endblock %}">Logs</a>
        <a href="/admin/users" class="{% block users_active %}{% endblock %}">Users</a>
        <div class="logout">
            <a href="/admin/logout">Logout</a>
        </div>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
