<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyAuth Admin - Login</title>
    <link rel="icon" href="/static/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(204,0,0,0.3); } 50% { box-shadow: 0 0 25px rgba(204,0,0,0.6); } }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .login-box { background: #0d0d0d; padding: 40px; border-radius: 12px; border: 1px solid #1a0000; width: 360px; animation: fadeIn 0.6s ease; }
        .login-box:hover { border-color: #330000; box-shadow: 0 0 30px rgba(204,0,0,0.1); }
        .login-box h1 { color: #cc0000; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(204,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .login-box .logo { width: 64px; height: 64px; border-radius: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #888; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 10px 14px; background: #0a0a0a; border: 1px solid #1a0000; border-radius: 6px; color: #e0e0e0; font-size: 14px; transition: all 0.3s ease; }
        .form-group input:focus { outline: none; border-color: #cc0000; box-shadow: 0 0 10px rgba(204,0,0,0.2); }
        .btn { width: 100%; padding: 12px; background: #cc0000; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; animation: glow 2s infinite; }
        .btn:hover { background: #ff1a1a; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(204,0,0,0.4); }
        .error { color: #ef6b6b; text-align: center; margin-bottom: 15px; font-size: 14px; animation: fadeIn 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #cc0000; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1><img src="/static/logo.png" class="logo" alt=""> Admin Login</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
