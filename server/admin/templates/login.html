<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyAuth Admin - Login</title>
    <link rel="icon" href="/static/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --background: hsl(0, 0%, 7%);
            --foreground: hsl(0, 0%, 98%);
            --card: hsl(0, 0%, 7%);
            --primary: hsl(0, 72%, 51%);
            --primary-dark: hsl(0, 72%, 45%);
            --muted-foreground: hsl(0, 0%, 63%);
            --border: hsl(0, 0%, 14%);
            --radius: 0.5rem;
            --phantom-red: hsl(0, 72%, 51%);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(220,38,38,0.3); } 50% { box-shadow: 0 0 40px rgba(220,38,38,0.6), 0 0 60px rgba(220,38,38,0.3); } }
        body { font-family: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'; background: var(--background); color: var(--foreground); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 360px; animation: fadeIn 0.6s ease; transition: border-color 0.3s ease; }
        .login-box:hover { border-color: rgba(255,255,255,0.1); }
        .login-box h1 { color: var(--primary); text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .login-box .logo { width: 64px; height: 64px; border-radius: var(--radius); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--muted-foreground); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--foreground); font-size: 14px; transition: all 0.2s ease; }
        .form-group input:focus { outline: none; border-color: rgba(220,38,38,0.5); box-shadow: 0 0 0 2px rgba(220,38,38,0.1); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease; animation: pulseGlow 2s infinite; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220,38,38,0.4); }
        .error { color: #f87171; text-align: center; margin-bottom: 15px; font-size: 14px; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
        ::-webkit-scrollbar-thumb { background: rgba(220,38,38,0.35); border-radius: 10px; border: 2px solid rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1><img src="/static/logo.png" class="logo" alt=""> Admin Login</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
